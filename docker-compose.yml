services:
  mysql-db:
    image: mysql:8.0
    container_name: e-commerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nahuel
      MYSQL_DATABASE: e-commerce
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pnahuel"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build: .
    container_name: e-commerce-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Sobreescribir la URL de la base de datos para que use el contenedor mysql-db y no localhost.
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/e-commerce?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  mysql_data:
